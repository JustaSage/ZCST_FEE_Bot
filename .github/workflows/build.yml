name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile main.py bot.py fetcher.py config.py store.py sso.py

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p dist
          tar czf dist/zcst-fee-bot-${VERSION}.tar.gz \
            --transform "s,^,zcst-fee-bot-${VERSION}/," \
            *.py config.yaml.example pyproject.toml requirements.txt \
            LICENSE README.md
          cd dist && zip -r zcst-fee-bot-${VERSION}.zip ../LICENSE ../README.md \
            ../config.yaml.example ../pyproject.toml ../requirements.txt ../*.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/zcst-fee-bot-*.tar.gz
            dist/zcst-fee-bot-*.zip
