name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: zcst-fee-bot-windows
            ext: .exe
          - os: ubuntu-latest
            artifact: zcst-fee-bot-linux
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --noconfirm --onefile --name fee-bot main.py

      - name: Prepare archive (Linux)
        if: runner.os == 'Linux'
        run: |
          cp config.yaml.example dist/config.yaml.example
          cp README.md dist/README.md
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Prepare archive (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item config.yaml.example dist/config.yaml.example
          Copy-Item README.md dist/README.md
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: ignore

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
